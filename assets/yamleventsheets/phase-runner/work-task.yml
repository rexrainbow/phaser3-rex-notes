title: work_task
durationTicks: 2
locationId: office
tags:
  - work

condition:
  and:
    - name: notBusy
      parameters:
        characterId: "{{$charId}}"
    # energy >= 20
    - name: characterStatus
      parameters:
        characterId: "{{$charId}}"
        field: energy
        operator: ">="
        value: 20

script:
  - condition:
      name: taskPhase
      parameters:
        activeTaskId: "{{$taskId}}"
        phase: tick
    # energy -= 10
    actions:
      - name: print
        parameters: { text: "{{$charId}} is working" }
      - name: modifyCharacterStatus
        parameters:
          characterId: "{{$charId}}"
          field: energy
          value: -10

  - condition:
      name: taskPhase
      parameters:
        activeTaskId: "{{$taskId}}"
        phase: complete
    # money += floor(skill) * 10
    actions:
      - name: modifyCharacterStatus
        parameters:
          characterId: "{{$charId}}"
          field: money
          value: "#(floor(characterStatus($charId, 'skill')) * 10)"
      - name: modifyCharacterStatus
        parameters:
          characterId: "{{$charId}}"
          field: skill
          value: 0.8
      - name: print
        parameters: { text: "{{$charId}} has {{characterStatus($charId, 'money')}} money" }